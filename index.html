
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edmonton Neighbourhood Periodic Table</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .periodic-grid {
            display: grid;
            grid-template-columns: repeat(21, minmax(110px, 1fr));
            gap: 4px;
        }

        /* Standard scrollbar suppression utility */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Desktop custom scrollbar */
        @media (min-width: 769px) {
            .custom-scrollbar::-webkit-scrollbar { 
                width: 6px; 
            }
            .custom-scrollbar::-webkit-scrollbar-track { 
                background: transparent; 
            }
            .custom-scrollbar::-webkit-scrollbar-thumb { 
                background: #1e293b; 
                border-radius: 10px; 
            }
            .custom-scrollbar::-webkit-scrollbar-thumb:hover { 
                background: #334155; 
            }
        }

        /* FORCE removal of all scrollbars on mobile as requested */
        @media (max-width: 768px) {
            ::-webkit-scrollbar {
                display: none !important;
            }
            * {
                -ms-overflow-style: none !important;
                scrollbar-width: none !important;
            }
        }
    </style>
<script type="importmap">

}
</script>

</html>
